<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ficha de Projeto</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --ink:         #0f1923;
  --ink2:        #2c3e50;
  --muted:       #6b7c93;
  --hint:        #a8b8cb;
  --border:      #dde4ee;
  --border2:     #c8d4e2;
  --surface:     #ffffff;
  --bg:          #f2f5f9;
  --bg2:         #e8edf4;
  --accent:      #1a56db;
  --accent-lt:   #e8eeff;
  --accent-dk:   #0f3ba8;
  --amber:       #d97706;
  --amber-lt:    #fef3c7;
  --emerald:     #059669;
  --emerald-lt:  #d1fae5;
  --rose:        #e11d48;
  --rose-lt:     #ffe4e6;
  --violet:      #7c3aed;
  --violet-lt:   #ede9fe;
  --sky:         #0284c7;
  --sky-lt:      #e0f2fe;

  --shadow:    0 1px 3px rgba(15,25,35,.06), 0 8px 24px rgba(15,25,35,.06);
  --shadow-sm: 0 1px 2px rgba(15,25,35,.05);
  --r:         10px;
  --r-sm:      6px;

  --mono: 'DM Mono', monospace;
  --sans: 'Syne', sans-serif;
  --serif: 'Lora', serif;
}

body {
  font-family: var(--serif);
  background: var(--bg);
  color: var(--ink);
  padding: 2rem 1rem 6rem;
  font-size: 14px;
  line-height: 1.7;
  min-height: 100vh;
}

body::before {
  content: '';
  position: fixed; inset: 0; z-index: -1;
  background-image:
    linear-gradient(rgba(26,86,219,.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(26,86,219,.025) 1px, transparent 1px);
  background-size: 32px 32px;
}

.page-wrap {
  max-width: 860px;
  margin: 0 auto;
}

/* ══ STATUS BANNER ══ */
.status-banner {
  display: flex;
  align-items: center;
  gap: 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 12px 20px;
  margin-bottom: 1rem;
  box-shadow: var(--shadow-sm);
}
.status-label {
  font-family: var(--mono);
  font-size: 0.6rem;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: .12em;
  color: var(--muted);
  flex-shrink: 0;
}
.status-pill {
  font-family: var(--mono);
  font-size: 0.65rem;
  font-weight: 500;
  padding: 4px 14px;
  border-radius: 20px;
  letter-spacing: .04em;
  cursor: pointer;
  appearance: none;
  -webkit-appearance: none;
  border: 1.5px solid currentColor;
}
.status-pill.em-execucao  { background: var(--emerald-lt); color: var(--emerald); }
.status-pill.iniciacao    { background: var(--sky-lt);     color: var(--sky); }
.status-pill.concluido    { background: var(--accent-lt);  color: var(--accent); }
.status-pill.pausado      { background: var(--amber-lt);   color: var(--amber); }
.status-pill.cancelado    { background: var(--rose-lt);    color: var(--rose); }
select.status-pill { padding-right: 8px; }
select.status-pill option { background: white; color: var(--ink); }

.status-divider {
  width: 1px; height: 24px;
  background: var(--border);
  flex-shrink: 0;
}
.status-date-wrap {
  display: flex;
  align-items: center;
  gap: 8px;
  flex: 1;
}
.status-date-label {
  font-family: var(--mono);
  font-size: 0.6rem;
  text-transform: uppercase;
  letter-spacing: .1em;
  color: var(--hint);
  white-space: nowrap;
}
.status-date-input {
  font-family: var(--mono);
  font-size: 0.72rem;
  color: var(--muted);
  background: transparent;
  border: none;
  outline: none;
}

/* ══ HEADER CARD ══ */
.header-card {
  background: linear-gradient(135deg, #0f2d5e 0%, #1a3f82 55%, #1e4fa0 100%);
  border-radius: var(--r);
  padding: 2.25rem 2.5rem 2rem;
  margin-bottom: 1rem;
  box-shadow: 0 6px 24px rgba(15,45,94,.35), 0 1px 4px rgba(0,0,0,.12);
  position: relative;
  overflow: hidden;
}
.header-card::before {
  content: '';
  position: absolute; top: -80px; right: -60px;
  width: 260px; height: 260px;
  background: radial-gradient(circle, rgba(255,255,255,.07) 0%, transparent 70%);
  border-radius: 50%;
}
.header-card::after {
  content: '';
  position: absolute; bottom: -20px; left: 40%;
  width: 400px; height: 80px;
  background: rgba(255,255,255,.03);
  border-radius: 50%;
}

.project-label {
  font-family: var(--mono);
  font-size: 0.58rem;
  letter-spacing: .15em;
  text-transform: uppercase;
  color: rgba(255,255,255,.45);
  margin-bottom: 10px;
  display: block;
  position: relative; z-index: 1;
}

.project-title {
  font-family: var(--sans);
  font-size: 1.75rem;
  font-weight: 800;
  letter-spacing: -.02em;
  line-height: 1.2;
  background: transparent;
  border: none;
  outline: none;
  color: #fff;
  width: 100%;
  margin-bottom: 8px;
  position: relative;
  z-index: 1;
}
.project-title::placeholder { color: rgba(255,255,255,.3); font-weight: 400; }

.project-sub {
  font-family: var(--mono);
  font-size: 0.68rem;
  letter-spacing: .06em;
  background: transparent;
  border: none;
  outline: none;
  color: rgba(255,255,255,.55);
  width: 100%;
  position: relative;
  z-index: 1;
}
.project-sub::placeholder { color: rgba(255,255,255,.3); }

/* ══ ADMONITIONS ══ */
details.adm {
  border-radius: var(--r);
  margin-bottom: .9rem;
  box-shadow: var(--shadow-sm);
  overflow: hidden;
  background: var(--surface);
  border: 1px solid var(--border);
  transition: box-shadow .2s;
}
details.adm[open] { box-shadow: var(--shadow); }

details.adm > summary {
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 12px 18px;
  font-family: var(--sans);
  font-size: 0.78rem;
  font-weight: 700;
  letter-spacing: .015em;
  cursor: pointer;
  user-select: none;
  list-style: none;
  color: #fff;
  position: relative;
}
details.adm > summary::-webkit-details-marker { display: none; }

.adm-icon { font-size: .95rem; flex-shrink: 0; line-height: 1; }

.adm-chevron {
  margin-left: auto;
  font-size: 0.65rem;
  transition: transform .22s cubic-bezier(.4,0,.2,1);
  opacity: .75;
}
details.adm[open] > summary .adm-chevron { transform: rotate(180deg); }

.adm-body {
  padding: 1.25rem 1.5rem;
  background: var(--surface);
  border-top: 1px solid rgba(0,0,0,.06);
}

/* Colors */
.adm-abstract > summary { background: #0284c7; }
.adm-tip      > summary { background: #059669; }
.adm-info     > summary { background: #0f766e; }
.adm-example  > summary { background: #6d28d9; }
.adm-success  > summary { background: #15803d; }
.adm-quote    > summary { background: #475569; }

.adm-abstract .adm-body { border-left: 4px solid #0284c7; }
.adm-tip      .adm-body { border-left: 4px solid #059669; }
.adm-info     .adm-body { border-left: 4px solid #0f766e; }
.adm-example  .adm-body { border-left: 4px solid #6d28d9; }
.adm-success  .adm-body { border-left: 4px solid #15803d; }
.adm-quote    .adm-body { border-left: 4px solid #475569; }

/* ══ FIELDS ══ */
.field-label {
  font-family: var(--mono);
  font-size: 0.58rem;
  font-weight: 500;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: .1em;
  margin-bottom: 6px;
  display: block;
}
.field-input {
  width: 100%;
  border: none;
  border-bottom: 1px solid var(--border);
  outline: none;
  background: transparent;
  font-family: var(--serif);
  font-size: 0.9rem;
  color: var(--ink);
  padding: 4px 0;
  transition: border-color .2s;
}
.field-input:focus { border-color: var(--accent); }
.field-input::placeholder { color: var(--hint); font-style: italic; }
textarea.field-input {
  resize: vertical;
  min-height: 80px;
  line-height: 1.8;
  padding-top: 4px;
}
.field-group { margin-bottom: 1rem; }

/* ══ LINK PILL ══ */
.link-pill {
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--accent-lt);
  border: 1px solid rgba(26,86,219,.18);
  border-radius: var(--r-sm);
  padding: 9px 14px;
  transition: border-color .2s, box-shadow .2s;
}
.link-pill:focus-within {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(26,86,219,.1);
}
.link-pill-icon { font-size: .95rem; flex-shrink: 0; }
.link-pill input {
  flex: 1;
  border: none;
  outline: none;
  background: transparent;
  font-family: var(--mono);
  font-size: 0.72rem;
  color: var(--accent);
  min-width: 0;
}
.link-pill input::placeholder { color: rgba(26,86,219,.35); }
.link-open {
  color: var(--accent);
  opacity: .55;
  text-decoration: none;
  font-size: .95rem;
  flex-shrink: 0;
  transition: opacity .15s;
  display: flex;
  align-items: center;
}
.link-open:hover { opacity: 1; }

/* ══ LINK GROUP ══ */
.link-group { display: flex; flex-direction: column; gap: 10px; }
.link-row { display: flex; align-items: center; gap: 10px; }
.link-row-label {
  font-family: var(--mono);
  font-size: 0.6rem;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: .1em;
  color: var(--muted);
  width: 52px;
  flex-shrink: 0;
}

/* ══ MARCOS ══ */
.marco-row {
  display: flex;
  gap: 10px;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
  align-items: center;
}
.marco-row:last-child { border-bottom: none; }
.marco-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--accent);
  flex-shrink: 0;
  box-shadow: 0 0 0 3px rgba(26,86,219,.15);
}
.marco-date {
  font-family: var(--mono);
  font-size: 0.68rem;
  color: var(--muted);
  border: none;
  outline: none;
  background: transparent;
  width: 120px;
  flex-shrink: 0;
}
.marco-title {
  font-family: var(--serif);
  font-size: 0.88rem;
  border: none;
  outline: none;
  background: transparent;
  flex: 1;
  color: var(--ink);
}
.marco-title::placeholder { color: var(--hint); font-style: italic; }
.marco-type {
  font-family: var(--mono);
  font-size: 0.63rem;
  border: none;
  outline: none;
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  width: 110px;
  flex-shrink: 0;
}

/* ══ ADD BTN ══ */
.add-btn {
  font-family: var(--mono);
  font-size: 0.62rem;
  font-weight: 500;
  color: var(--muted);
  background: transparent;
  border: 1px dashed var(--border2);
  border-radius: var(--r-sm);
  padding: 7px 14px;
  cursor: pointer;
  width: 100%;
  text-align: left;
  margin-top: 10px;
  transition: border-color .18s, color .18s, background .18s;
}
.add-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: var(--accent-lt);
}

/* ══ ACTIONS BAR ══ */
.actions-bar {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-top: 1.25rem;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 1rem 1.5rem;
  box-shadow: var(--shadow-sm);
  align-items: center;
}
.btn {
  font-family: var(--mono);
  font-size: 0.63rem;
  font-weight: 500;
  padding: 8px 18px;
  border-radius: var(--r-sm);
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  letter-spacing: .02em;
  transition: all .16s;
  display: flex;
  align-items: center;
  gap: 6px;
}
.btn:hover { background: var(--bg); color: var(--ink); border-color: var(--border2); }
.btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn-primary:hover { background: var(--accent-dk); color: #fff; border-color: var(--accent-dk); }
.btn-violet { background: var(--violet-lt); color: var(--violet); border-color: #c4b5fd; }
.btn-violet:hover { background: var(--violet); color: #fff; border-color: var(--violet); }
.btn-ghost { color: var(--rose); }
.btn-ghost:hover { background: var(--rose-lt); border-color: var(--rose); color: var(--rose); }

/* ══ PRINT ══ */
@media print {
  body { background: white; padding: 0; }
  body::before { display: none; }
  details.adm { box-shadow: none; border: 1px solid #ddd; }
  details.adm[open] { break-inside: avoid; }
  .actions-bar { display: none; }
  .add-btn { display: none; }
}

@media (max-width: 600px) {
  .header-card { padding: 1.5rem 1.25rem; }
  .adm-body { padding: 1rem; }
  .marco-type { display: none; }
  .status-banner { flex-wrap: wrap; }
}
</style>
</head>
<body>
<div class="page-wrap">

  <!-- ══ HEADER ══ -->
  <div class="header-card">
    <span class="project-label">Ficha de Projeto</span>
    <input class="project-title" id="inp-title" type="text" placeholder="Título do projeto" />
    <input class="project-sub"   id="inp-sub"   type="text" placeholder="SIGLA-ANO · Unidade responsável" />
  </div>

  <!-- ══ STATUS BANNER ══ -->
  <div class="status-banner">
    <span class="status-label">Status</span>
    <select class="status-pill em-execucao" id="inp-status" onchange="updateStatusPill(this)">
      <option value="em-execucao">Em execução</option>
      <option value="iniciacao">Iniciação</option>
      <option value="concluido">Concluído</option>
      <option value="pausado">Pausado</option>
      <option value="cancelado">Cancelado</option>
    </select>

  </div>

  <!-- ══ DESCRIÇÃO (aberta) ══ -->
  <details class="adm adm-abstract" open>
    <summary>
      Descrição
      <span class="adm-chevron">▼</span>
    </summary>
    <div class="adm-body">
      <textarea id="inp-desc" class="field-input" placeholder="Descreva o que é o projeto, qual problema resolve e para quem."></textarea>
    </div>
  </details>

  <!-- ══ OBJETIVO (aberto) ══ -->
  <details class="adm adm-tip" open>
    <summary>
      Objetivos
      <span class="adm-chevron">▼</span>
    </summary>
    <div class="adm-body">
      <textarea id="inp-obj" class="field-input" placeholder="Declare o objetivo geral em uma frase clara e mensurável."></textarea>
    </div>
  </details>

  <!-- ══ LINHA DO TEMPO (aberta) ══ -->
  <details class="adm adm-info" open>
    <summary>
      Linha do Tempo
      <span class="adm-chevron">▼</span>
    </summary>
    <div class="adm-body">
      <div id="marcos-block">
        <div class="marco-row">
          <div class="marco-dot"></div>
          <input class="marco-date" type="date" title="Data do marco" />
          <input class="marco-title" type="text" placeholder="Título do marco (ex: Entrega do MVP, Publicação v1.0)" />
          <select class="marco-type">
            <option value="marco">Marco</option>
            <option value="entrega">Entrega</option>
            <option value="reuniao">Reunião</option>
            <option value="decisao">Decisão</option>
            <option value="publicacao">Publicação</option>
          </select>
        </div>
        <div class="marco-row">
          <div class="marco-dot"></div>
          <input class="marco-date" type="date" title="Data do marco" />
          <input class="marco-title" type="text" placeholder="Título do marco" />
          <select class="marco-type">
            <option value="marco">Marco</option>
            <option value="entrega">Entrega</option>
            <option value="reuniao">Reunião</option>
            <option value="decisao">Decisão</option>
            <option value="publicacao">Publicação</option>
          </select>
        </div>
      </div>
      <button class="add-btn" onclick="addMarco()">+ adicionar marco</button>
    </div>
  </details>

  <!-- ══ GESTÃO À VISTA (aberto) ══ -->
  <details class="adm adm-example" open>
    <summary>
      Projeto no Github — Gestão à Vista
      <span class="adm-chevron">▼</span>
    </summary>
    <div class="adm-body">
      <div class="link-pill">
        <input type="url" id="gav-link"
               placeholder="https://github.com/orgs/org/projects/N"
               oninput="syncLink('gav-link','gav-open')" />
        <a class="link-open" id="gav-open" href="#" target="_blank" rel="noopener noreferrer" title="Abrir painel">↗</a>
      </div>
    </div>
  </details>

  <!-- ══ GANHOS ESPERADOS (aberto) ══ -->
  <details class="adm adm-success" open>
    <summary>
      Ganhos Esperados
      <span class="adm-chevron">▼</span>
    </summary>
    <div class="adm-body">
      <textarea id="inp-ganhos" class="field-input" style="min-height:80px;"
        placeholder="Descreva os ganhos quantitativos e qualitativos esperados com a entrega do projeto."></textarea>
    </div>
  </details>

  <!-- ══ OBSERVAÇÕES (aberto) ══ -->
  <details class="adm adm-quote" open>
    <summary>
      Observações
      <span class="adm-chevron">▼</span>
    </summary>
    <div class="adm-body">
      <textarea id="inp-obs" class="field-input" style="min-height:70px;"
        placeholder="Campo livre para exceções ou contextos atípicos."></textarea>
    </div>
  </details>

  <!-- ══ ACTIONS ══ -->
  <div class="actions-bar">
    <button class="btn btn-primary" onclick="exportarHTML()">Salvar como HTML</button>
    <button class="btn" onclick="window.print()">Imprimir / PDF</button>
    <button class="btn btn-violet" onclick="gerarMarkdown()">Gerar Markdown</button>
    <button class="btn btn-ghost" style="margin-left:auto;" onclick="limparFicha()">Limpar ficha</button>
  </div>

</div>

<script>
'use strict';

// ══ STATUS PILL ══
function updateStatusPill(sel) {
  const classes = ['em-execucao','iniciacao','concluido','pausado','cancelado'];
  classes.forEach(c => sel.classList.remove(c));
  sel.classList.add(sel.value);
}

// ══ LINK SYNC ══
function syncLink(inputId, anchorId) {
  const val = document.getElementById(inputId).value.trim();
  document.getElementById(anchorId).href = val || '#';
}

// ══ ADD MARCO ══
function addMarco() {
  const b = document.getElementById('marcos-block');
  const d = document.createElement('div');
  d.className = 'marco-row';
  d.innerHTML = `
    <div class="marco-dot"></div>
    <input class="marco-date" type="date" title="Data do marco"/>
    <input class="marco-title" type="text" placeholder="Título do marco"/>
    <select class="marco-type">
      <option value="marco">Marco</option>
      <option value="entrega">Entrega</option>
      <option value="reuniao">Reunião</option>
      <option value="decisao">Decisão</option>
      <option value="publicacao">Publicação</option>
    </select>`;
  b.appendChild(d);
}

// ══ HELPERS ══
const MESES_PT = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho',
                  'Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

function fmtBr(iso) {
  if (!iso) return '—';
  const d = new Date(iso + 'T12:00:00');
  return isNaN(d) ? iso : d.toLocaleDateString('pt-BR');
}
function cleanMermaid(t) {
  return (t||'').replace(/[:#()\/,;]/g,'-').replace(/\s+/g,' ').trim().substring(0,60);
}

// ══ MARKDOWN ══
function gerarMarkdown() {
  try {
    const titulo      = document.getElementById('inp-title').value.trim() || 'Projeto sem título';
    const sub         = document.getElementById('inp-sub').value.trim();
    const status      = document.getElementById('inp-status').options[document.getElementById('inp-status').selectedIndex].text;
    const desc        = document.getElementById('inp-desc').value.trim();
    const obj         = document.getElementById('inp-obj').value.trim();
    const ganhos      = document.getElementById('inp-ganhos').value.trim();
    const obs         = document.getElementById('inp-obs').value.trim();
    const gavLink     = document.getElementById('gav-link').value.trim();

    const marcos = [];
    document.querySelectorAll('#marcos-block .marco-row').forEach(row => {
      const date  = row.querySelector('.marco-date')?.value;
      const title = row.querySelector('.marco-title')?.value?.trim();
      const type  = row.querySelector('.marco-type')?.value || 'marco';
      if (date && title) marcos.push({ date, title, type });
    });

    function timelineBlock() {
      if (!marcos.length) return '';
      const mapa = {};
      marcos.forEach(m => {
        const d = new Date(m.date + 'T12:00:00');
        if (isNaN(d)) return;
        const key = `${MESES_PT[d.getMonth()]} ${d.getFullYear()}`;
        if (!mapa[key]) mapa[key] = [];
        mapa[key].push({ date: m.date, title: m.title });
      });
      const sortedKeys = Object.keys(mapa).sort((a,b) => {
        const p = k => { const [mes,ano] = k.split(' '); return new Date(`${ano}-${MESES_PT.indexOf(mes)+1}-01`); };
        return p(a) - p(b);
      });
      let inner = '    ```mermaid\n    timeline\n';
      inner += `        title Linha do Tempo — ${titulo}\n`;
      sortedKeys.forEach(key => {
        inner += `        section ${key}\n`;
        mapa[key].forEach((ev, i) => {
          const label = cleanMermaid(ev.title);
          if (i === 0) inner += `            ${fmtBr(ev.date)} : ${label}\n`;
          else         inner += `                       : ${label}\n`;
        });
      });
      inner += '    ```\n';
      // timeline aberta (!!!)
      return `!!! info "Linha do Tempo — ${titulo}"\n\n${inner}\n`;
    }

    function adm(type, title, content, collapsible = false) {
      const marker = collapsible ? '???' : '!!!';
      let block = `${marker} ${type} "${title}"\n\n`;
      block += content.split('\n').map(l => l ? '    ' + l : '').join('\n');
      block += '\n\n';
      return block;
    }

    // slug para nome do arquivo
    const slug = titulo.normalize('NFD').replace(/[\u0300-\u036f]/g,'')
      .toLowerCase().replace(/\s+/g,'_').replace(/[^a-z0-9_]/g,'');

    let md = `# ${titulo}\n\n`;
    if (sub) md += `> **${sub}**\n\n`;
    md += `---\n\n`;

    md += `<div class="project-status-card" markdown>\n\n`;
    md += `**Status:** \`${status}\`\n\n`;
    md += `</div>\n\n`;

    if (desc) md += adm('abstract', 'Descrição', desc, false);
    if (obj)  md += adm('tip', 'Objetivos', obj, true);

    if (marcos.length) md += timelineBlock();

    if (gavLink) {
      md += adm('info', 'Projeto no Github — Gestão à Vista',
        `Acesse o painel do projeto no GitHub:\n\n[ Acessar Painel ](${gavLink}){ .md-button }`, true);
    }

    if (ganhos) md += adm('success', 'Ganhos Esperados', ganhos, true);
    if (obs)    md += adm('quote', 'Observações', obs, true);


    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([md], { type:'text/markdown' }));
    a.download = (slug || 'ficha_projeto') + '.md';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(a.href);
  } catch(e) {
    alert('Erro ao gerar Markdown: ' + e.message);
    console.error(e);
  }
}

// ══ EXPORT HTML ══
function exportarHTML() {
  const html = '<!DOCTYPE html>\n' + document.documentElement.outerHTML;
  const titulo = document.getElementById('inp-title').value.trim() || 'ficha_projeto';
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([html], { type:'text/html' }));
  a.download = titulo.toLowerCase().replace(/\s+/g,'_').replace(/[^a-záéíóúãõâêôàüç0-9_]/gi, '').normalize('NFD').replace(/[\u0300-\u036f]/g,'') + '.html';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
}

// ══ CLEAR ══
function limparFicha() {
  if (!confirm('Limpar todos os campos da ficha?')) return;
  document.querySelectorAll('input[type=text],input[type=url],textarea')
    .forEach(e => e.value = '');
  document.querySelectorAll('select').forEach(e => e.selectedIndex = 0);
  updateStatusPill(document.getElementById('inp-status'));
  ['gav-open'].forEach(id => {
    document.getElementById(id).href = '#';
  });
}
</script>
