name: "Atualizar Ficha de Projetos"

on:
  # Executa quando Issues ou PRs são abertos
  issues:
    types: [opened, assigned, labeled, milestoned]
  pull_request:
    types: [opened, reopened, assigned, labeled]
  
  # Executa quando items são adicionados a projetos
  project_card:
    types: [created, moved, converted]
  
  # Permite execução manual
  workflow_dispatch:
    inputs:
      project_name:
        description: 'Nome do projeto para filtrar (opcional)'
        required: false
        default: ''
  
  # Executa periodicamente (a cada 6 horas)
  schedule:
    - cron: '*/360 * * * *'

jobs:
  atualizar-ficha:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: read
      pull-requests: read
      projects: read
    
    steps:
      - name: Checkout do código
        uses: actions/checkout@v3
      
      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
      
      - name: Instalar dependências
        run: |
          pip install requests
      
      - name: Executar script de geração
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PROJECT_NAME: "teste AID"
        run: python gerar_ficha_projetos.py
      
      - name: Commitar e enviar mudanças
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Actions Bot"
          git add ficha-projetos/
          
          # Só commita se houver mudanças
          if git diff --staged --quiet; then
            echo "Nenhuma mudança para commitar"
          else
            git commit -m "docs: atualiza ficha de projetos [skip ci]"
            git push
          fi