name: "Atualizar Ficha de Projetos"

on:
  issues:
    types: [opened, edited, labeled, closed]
  pull_request:
    types: [opened, edited, closed]
  workflow_dispatch:

jobs:
  atualizar-ficha:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Permissão essencial para fazer push
    
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}
      
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      
      - name: Instalar dependências
        run: pip install requests
      
      - name: Executar script
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
          PROJECT_NAME: "teste AID"
        run: python gerar_ficha_projetos.py
      
      - name: Fazer push das mudanças
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add ficha-projetos/README.md
          git commit -m "Atualiza ficha de projetos" || echo "Nada para commitar"
          git push