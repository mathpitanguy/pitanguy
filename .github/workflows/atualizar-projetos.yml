name: "Atualizar Ficha de Projetos"

on:
  issues:
    types: [opened, edited, labeled, closed]
  pull_request:
    types: [opened, edited, closed]
  workflow_dispatch:

jobs:
  atualizar-ficha:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      
      - run: pip install requests
      
      - name: Executar script
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
          PROJECT_NAME: "teste AID"
        run: python gerar_ficha_projetos.py
      
      - name: Fazer push (somente se houver mudanças)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Verifica se o arquivo foi modificado
          if git diff --quiet ficha-projetos/; then
            echo "✅ Nenhuma mudança no arquivo - push não necessário"
          else
            git add ficha-projetos/
            git commit -m "Atualiza ficha [skip ci]"
            git pull origin main --rebase
            git push origin main
            echo "✅ Push realizado com sucesso"
          fi