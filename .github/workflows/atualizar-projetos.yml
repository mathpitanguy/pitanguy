name: "Atualizar Ficha de Projetos"

on:
  issues:
    types: [opened, edited, labeled]
  pull_request:
    types: [opened, edited]
  workflow_dispatch:

jobs:
  atualizar-ficha:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout do código
        uses: actions/checkout@v3
      
      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
      
      - name: Instalar dependências
        run: pip install requests
      
      - name: Executar script
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
          PROJECT_NAME: "teste AID"
        run: python gerar_ficha_projetos.py
      
      - name: Commitar mudanças
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add ficha-projetos/
          git diff --quiet && git diff --staged --quiet || (git commit -m "docs: atualiza ficha" && git push)