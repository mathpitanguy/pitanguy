name: "Atualizar Ficha de Projetos"

on:
  issues:
    types: [opened, edited, labeled, closed]
  pull_request:
    types: [opened, edited, closed]
  workflow_dispatch:

jobs:
  atualizar-ficha:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 0  # ← Importante: pega todo histórico
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      
      - run: pip install requests
      
      - name: Executar script
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
          PROJECT_NAME: "teste AID"
        run: python gerar_ficha_projetos.py
      
      - name: Fazer push das mudanças
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Puxa mudanças remotas antes de push
          git pull origin main --rebase || true
          
          # Adiciona e commita
          git add ficha-projetos/
          git commit -m "Atualiza ficha do projeto [skip ci]" || echo "Sem mudanças para commitar"
          
          # Push com force only se necessário
          git push origin main || git push origin main --force-with-lease