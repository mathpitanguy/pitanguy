name: "Atualizar Ficha de Projetos"

on:
  workflow_dispatch:    # Só executa quando você clicar em "Run workflow"

jobs:
  gerar-ficha:
    runs-on: ubuntu-latest
    
    steps:
      - name: Baixar o código do repositório
        uses: actions/checkout@v4
      
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      
      - name: Instalar dependências
        run: pip install requests
      
      - name: Executar script para gerar a ficha
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
          PROJECT_NAME: "teste AID"
        run: python gerar_ficha_projetos.py
      
      - name: Mostrar o resultado gerado
        run: |
          echo "========================================="
          echo "     FICHA DE PROJETOS GERADA"
          echo "========================================="
          cat ficha-projetos/README.md
          echo "========================================="
          echo "✅ Arquivo atualizado em: ficha-projetos/README.md"
          echo "⚠️  O arquivo foi gerado mas NÃO foi enviado (push) para o GitHub"